<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* Container */
.container {
    padding: 20px;
}

/* Profile Image */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid #00ff99;
    object-fit: cover;
    margin-top: 20px;
}

/* Title */
h1 {
    margin: 15px 0 5px;
    font-size: 32px;
}

.subtitle {
    color: #ccc;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.card h2 {
    margin: 0;
}

/* Button */
.btn {
    margin-top: 25px;
    padding: 15px 25px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    color: white;
    background: linear-gradient(45deg, #3a7bd5, #a044ff);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* Animation */
.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    transform: scale(1.05);
}

/* Features */
.features {
    margin-top: 30px;
    text-align: left;
}

.feature {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
